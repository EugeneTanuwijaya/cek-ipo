services:
  backend:
    build:
      context: ./backend
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      DB_PATH: /data/ipo.db
    volumes:
      - ipo-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  ipo-data:
  caddy-data:
  caddy-config:
